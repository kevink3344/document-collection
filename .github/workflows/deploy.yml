name: Build and Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}   # Set in repo → Settings → Variables → Actions
  AZURE_WEBAPP_PACKAGE_PATH: server                  # Deploy the server folder (contains built API + static client)

jobs:
  # ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ──────────────────────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # ── Install dependencies ──────────────────────────────────
      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Install server dependencies
        run: npm ci --prefix server

      # ── Build client ──────────────────────────────────────────
      - name: Build client (Vite + TypeScript)
        run: npm run build --prefix client

      # ── Build server ──────────────────────────────────────────
      - name: Build server (TypeScript)
        run: npm run build --prefix server

      # ── Bundle: copy client dist → server/public ─────────────
      - name: Copy client dist into server/public
        run: |
          mkdir -p server/public
          cp -r client/dist/. server/public/

      # ── Prepare deployment artifact ───────────────────────────
      # Include only server dist + node_modules (production) + public + package files
      - name: Prune server to production dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: azure-webapp-artifact
          path: |
            server/dist/
            server/public/
            server/package.json
            server/node_modules/
          retention-days: 1

  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: azure-webapp-artifact
          path: deploy

      # Write a minimal package.json start script at the deploy root
      # so Azure knows how to start the app (already exists from upload above)
      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy
