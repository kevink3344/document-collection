# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - datacollectionpro

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: |
          npm ci --include=dev

      - name: Install client dependencies
        run: npm ci --prefix client --include=dev

      - name: Install server dependencies
        run: npm ci --prefix server --include=dev

      - name: Build client
        run: npm run build --prefix client

      - name: Build server
        run: npm run build --prefix server

      - name: Copy client dist into server/public
        run: |
          mkdir -p server/public
          cp -r client/dist/. server/public/

      - name: Prune server to production dependencies
        run: npm ci --prefix server --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            server/dist/
            server/public/
            server/package.json
            server/node_modules/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'datacollectionpro'
          slot-name: 'Production'
          package: deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CB79E97B0E854D60B07A3DF4739EC53D }}